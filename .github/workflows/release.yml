name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-macos:
    name: macOS — arm64
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.8.3'
          host: mac
          modules: 'qtmultimedia'
          cache: true

      - name: Build
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release --parallel

      - name: Package DMG
        run: |
          APP=$(find build -name "*.app" -maxdepth 3 | head -1)
          macdeployqt "$APP"
          codesign --deep --force --sign - "$APP"
          hdiutil create -volname "DlnaBrowser" -srcfolder "$APP" -ov -format UDZO "DlnaBrowser-macOS-arm64.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: DlnaBrowser-macOS-arm64
          path: "*.dmg"
          if-no-files-found: error

  build-windows:
    name: Windows — x86_64
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.8.3'
          host: windows
          arch: win64_msvc2022_64
          modules: 'qtmultimedia'
          cache: true

      - name: Install NSIS
        run: choco install nsis --no-progress -y

      - name: Generate Windows icon
        shell: pwsh
        run: |
          magick -background none resources/icon.svg `
            -define icon:auto-resize="256,128,64,48,32,16" `
            resources/DlnaBrowser.ico

      - name: Build
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release --parallel

      - name: Deploy & Package
        shell: pwsh
        run: |
          $VERSION = (Select-String -Path CMakeLists.txt -Pattern 'project\(DlnaBrowser VERSION (\S+)').Matches[0].Groups[1].Value.Trim()
          cmake --install build --prefix dist --config Release
          windeployqt "dist\bin\DlnaBrowser.exe" --release --no-translations
          & "C:\Program Files (x86)\NSIS\makensis.exe" /NOCD /DVERSION=$VERSION packaging\installer.nsi

      - uses: actions/upload-artifact@v4
        with:
          name: DlnaBrowser-Windows-x64
          path: DlnaBrowser-Windows-x64-Setup.exe
          if-no-files-found: error

  build-linux:
    name: Linux — ${{ matrix.pkg }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        pkg: [deb, rpm]

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libxkbcommon-dev \
            libxcb-cursor-dev \
            patchelf \
            rpm

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.8.3'
          host: linux
          modules: 'qtmultimedia'
          cache: true

      - name: Build
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build build --parallel

      - name: Install to staging
        run: cmake --install build --prefix staging

      - name: Bundle Qt libraries
        run: |
          QT_LIBS=$(qmake -query QT_INSTALL_LIBS 2>/dev/null || echo "$QT_ROOT_DIR/lib")
          QT_PLUGINS=$(qmake -query QT_INSTALL_PLUGINS 2>/dev/null || echo "$QT_ROOT_DIR/plugins")

          mkdir -p staging/lib/DlnaBrowser/plugins

          for lib in Core Gui Widgets Network Xml Multimedia MultimediaWidgets Svg DBus XcbQpa OpenGL OpenGLWidgets; do
            lib_file="$QT_LIBS/libQt6${lib}.so.6"
            [ -f "$lib_file" ] && cp "$lib_file" staging/lib/DlnaBrowser/
          done

          for plugin in platforms imageformats multimedia xcbglintegrations; do
            [ -d "$QT_PLUGINS/$plugin" ] && cp -r "$QT_PLUGINS/$plugin" staging/lib/DlnaBrowser/plugins/
          done

          # Bundle ICU libraries that Qt6Core depends on (version varies by runner)
          for icu_lib in $(ldd staging/lib/DlnaBrowser/libQt6Core.so.6 2>/dev/null \
              | grep -oP '/\S+libicu\S+\.so\.\d+'); do
            [ -f "$icu_lib" ] && cp "$icu_lib" staging/lib/DlnaBrowser/
          done

          # Bundle Qt-provided libs required by plugins (FFmpeg for multimedia,
          # WaylandClient for wayland platform, etc.) — scan originals before patchelf
          for plugin_dir in platforms imageformats multimedia xcbglintegrations; do
            [ -d "$QT_PLUGINS/$plugin_dir" ] || continue
            while IFS= read -r so; do
              while IFS= read -r dep; do
                dest="staging/lib/DlnaBrowser/$(basename "$dep")"
                if [ -f "$dep" ] && [ ! -f "$dest" ]; then
                  cp "$dep" "$dest"
                fi
              done < <(ldd "$so" 2>/dev/null | grep -oP "$QT_LIBS/\S+\.so\.\S+" || true)
            done < <(find "$QT_PLUGINS/$plugin_dir" -name '*.so')
          done

          # Move binary into the private lib dir so qt.conf doesn't leak to other apps
          mv staging/bin/DlnaBrowser staging/lib/DlnaBrowser/DlnaBrowser

          # Redirect binary RPATH to bundled Qt libs (same dir now)
          patchelf --set-rpath '$ORIGIN' staging/lib/DlnaBrowser/DlnaBrowser

          # Redirect plugin RPATHs so they find bundled Qt libs
          find staging/lib/DlnaBrowser/plugins -name '*.so' \
            -exec patchelf --set-rpath '$ORIGIN/../../' {} \;

          # qt.conf next to the private binary — does NOT affect other Qt apps in /usr/bin
          printf '[Paths]\nPlugins = /usr/lib/DlnaBrowser/plugins\n' \
            > staging/lib/DlnaBrowser/qt.conf

          # Thin launcher wrapper exposed in PATH
          printf '#!/bin/sh\nexec /usr/lib/DlnaBrowser/DlnaBrowser "$@"\n' \
            > staging/bin/DlnaBrowser
          chmod +x staging/bin/DlnaBrowser

      - name: Install fpm
        run: sudo gem install fpm --no-document

      - name: Create package
        run: |
          VERSION=$(grep -oP '(?<=project\(DlnaBrowser VERSION )\S+' CMakeLists.txt)
          fpm -s dir -t ${{ matrix.pkg }} \
            -n dlna-browser \
            -v "$VERSION" \
            --description "DLNA media browser" \
            --license MIT \
            --url "https://github.com/${{ github.repository }}" \
            --after-install packaging/postinst.sh \
            --prefix /usr \
            -C staging \
            .

      - uses: actions/upload-artifact@v4
        with:
          name: DlnaBrowser-Linux-${{ matrix.pkg }}
          path: |
            *.deb
            *.rpm
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
